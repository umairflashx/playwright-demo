name: Update Playwright

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Feature branch to update"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-playwright:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Update Playwright
        run: pnpm add -D @playwright/test@latest

      - name: Commit and push to target branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add package.json pnpm-lock.yaml
          git commit -m "Update Playwright" || echo "No changes to commit"
          git push origin HEAD:${{ inputs.target_branch }}
